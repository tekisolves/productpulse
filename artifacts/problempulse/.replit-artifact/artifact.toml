kind = "web"
previewPath = "/"
title = "ProblemPulse"
version = "1.0.0"
id = "artifacts/problempulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25416

[services.development]
run = "pnpm --filter @workspace/problempulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/problempulse", "run", "build" ]
publicDir = "artifacts/problempulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25416"
BASE_PATH = "/"
